<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Duck in Lava</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at center, #ff7a18, #ff3c00, #8b0000);
    overflow: hidden;
    font-family: system-ui, sans-serif;
  }
  .lava {
    position: relative;
    width: 90vw;
    height: 70vh;
    border-radius: 30px;
    background: repeating-linear-gradient(
      45deg,
      rgba(255, 120, 0, 0.9),
      rgba(255, 120, 0, 0.9) 20px,
      rgba(255, 60, 0, 0.9) 20px,
      rgba(255, 60, 0, 0.9) 40px
    );
    box-shadow: inset 0 0 40px rgba(0,0,0,0.4);
    animation: lavaFlow 4s linear infinite;
  }
  @keyframes lavaFlow {
    from { background-position: 0 0; }
    to { background-position: 200px 200px; }
  }
  .duck {
    position: absolute;
    font-size: 3rem;
    user-select: none;
    pointer-events: none;
  }
  .title {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-weight: bold;
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
<div class="lava" id="lava">
  <div class="title">🔥 Duck casually swimming in lava 🦆</div>
  <div class="duck" id="duck">🦆</div>
</div><script>
const duck = document.getElementById('duck');
const lava = document.getElementById('lava');

let x = 100;
let y = 100;
let vx = 2 + Math.random() * 2;
let vy = 2 + Math.random() * 2;

function moveDuck() {
  const rect = lava.getBoundingClientRect();

  x += vx;
  y += vy;

  if (x < 0 || x > rect.width - 40) vx *= -1;
  if (y < 0 || y > rect.height - 40) vy *= -1;

  duck.style.transform = `translate(${x}px, ${y}px)`;

  requestAnimationFrame(moveDuck);
}

moveDuck();
</script></body>
</html>
